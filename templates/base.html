<!doctype html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMatch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-links a:first-child {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .nav-links a:last-child {
            border: 2px solid #667eea;
            color: #667eea;
            background: transparent;
        }

        .nav-links a:hover {
            transform: translateY(-2px);
        }

        .nav-links a:first-child:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .nav-links a:last-child:hover {
            background: #667eea;
            color: white;
        }

        .separator {
            margin: 0 10px;
            color: #ccc;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            .container {
                padding: 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .nav-links {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ברוכים הבאים ל-JobMatch</h1>
        <p style="margin-bottom: 1rem; color: #666; font-size: 1.1rem;">הפלטפורמה המובילה לחיבור בין מעסיקים ועובדים</p>
        <div class="nav-links">
            <a href="{{ url_for('login') }}">התחבר</a>
            <a href="{{ url_for('register') }}">הרשמה</a>
        </div>
    </div>
</body>
</html>
